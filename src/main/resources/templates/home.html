<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <title>Online Examination</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe6;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #0f766e;
            --accent-2: #f97316;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 30%),
                radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.16), transparent 28%),
                var(--bg);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .shell {
            width: min(900px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(31, 41, 55, 0.14);
            overflow: hidden;
        }

        .hero {
            padding: 56px 48px 32px;
            background: linear-gradient(135deg, rgba(15, 118, 110, 0.08), rgba(249, 115, 22, 0.08));
        }

        h1 {
            margin: 0;
            font-size: clamp(2.6rem, 6vw, 5rem);
            line-height: 0.95;
            letter-spacing: 0.02em;
        }

        .subtext {
            margin: 18px 0 0;
            max-width: 42rem;
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--muted);
        }

        .actions {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            padding: 0 48px 48px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 160px;
            padding: 14px 22px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(31, 41, 55, 0.12);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }

        .footer {
            padding: 0 48px 42px;
            color: var(--muted);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="hero">
            <h1>Online Examination</h1>
            <p class="subtext">
                Log in with an existing account or sign up to create a new student profile.
            
            </p>
        </section>
        <section class="actions">
            <a class="btn btn-primary" th:href="@{/login}">Login</a>
            <a class="btn btn-secondary" th:href="@{/signup}">Sign Up</a>
        </section>
        <div class="footer">
            Built for online exam practice and student profile management.
        </div>
    </main>
</body>
</html>
