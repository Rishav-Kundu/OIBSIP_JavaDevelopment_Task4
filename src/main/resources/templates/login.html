<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Online Examination System</title>

```
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#4f46e5,#06b6d4);
    }

    .container{
        width:400px;
        background:white;
        padding:35px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    h2{
        text-align:center;
        margin-bottom:25px;
        color:#333;
    }

    .form-group{
        margin-bottom:15px;
    }

    label{
        display:block;
        margin-bottom:5px;
        font-weight:bold;
        color:#444;
    }

    input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:14px;
    }

    input:focus{
        outline:none;
        border-color:#4f46e5;
    }

    .btn{
        width:100%;
        padding:12px;
        border:none;
        border-radius:8px;
        background:#4f46e5;
        color:white;
        font-size:16px;
        cursor:pointer;
        margin-top:10px;
    }

    .btn:hover{
        background:#4338ca;
    }

    .links{
        text-align:center;
        margin-top:20px;
    }

    .links a{
        text-decoration:none;
        color:#4f46e5;
        font-weight:bold;
    }

    .links a:hover{
        text-decoration:underline;
    }

    .success{
        color:green;
        text-align:center;
        margin-bottom:15px;
    }

    .error{
        color:red;
        text-align:center;
        margin-bottom:15px;
    }
</style>
```

</head>

<body>

<div class="container">

```
<h2>Student Login</h2>

<div class="success" th:if="${param.registered}">
    Registration successful. Please login.
</div>

<div class="success" th:if="${param.logout}">
    Logged out successfully.
</div>

<div class="error" th:if="${param.error}">
    Invalid username or password.
</div>

<form th:action="@{/login}" method="post">

    <div class="form-group">
        <label>Username</label>
        <input type="text"
               name="username"
               placeholder="Enter username"
               required>
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password"
               name="password"
               placeholder="Enter password"
               required>
    </div>

    <button type="submit" class="btn">
        Login
    </button>

</form>

<div class="links">
    <p>
        Don't have an account?
        <a th:href="@{/signup}">Sign Up</a>
    </p>

    <br>

    <a th:href="@{/}">
        ← Back to Home
    </a>
</div>
```

</div>

</body>
</html>
