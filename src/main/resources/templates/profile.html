<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Update Profile</title>

```
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:"Segoe UI",sans-serif;
    }

    body{
        min-height:100vh;
        background:#f5f7fb;
        display:flex;
    }

    /* Sidebar */

    .sidebar{
        width:280px;
        background:linear-gradient(180deg,#3b5bdb,#2563eb);
        color:white;
        display:flex;
        flex-direction:column;
        padding:30px 20px;
    }

    .logo{
        margin-bottom:40px;
    }

    .logo h2{
        font-size:28px;
        margin-bottom:5px;
    }

    .logo p{
        opacity:0.8;
    }

    .nav-links{
        display:flex;
        flex-direction:column;
        gap:15px;
    }

    .nav-links a{
        text-decoration:none;
        color:white;
        padding:15px 20px;
        border-radius:12px;
        transition:0.3s;
        font-size:17px;
    }

    .nav-links a:hover{
        background:rgba(255,255,255,0.15);
    }

    .active{
        background:rgba(255,255,255,0.18);
    }

    .logout-section{
        margin-top:auto;
    }

    .logout-btn{
        width:100%;
        padding:15px;
        border:none;
        border-radius:12px;
        background:rgba(255,255,255,0.12);
        color:white;
        cursor:pointer;
        font-size:16px;
    }

    /* Main */

    .main{
        flex:1;
        padding:40px;
    }

    .header{
        margin-bottom:30px;
    }

    .header h1{
        font-size:42px;
        color:#111827;
        margin-bottom:8px;
    }

    .header p{
        color:#6b7280;
        font-size:18px;
    }

    .profile-card{
        background:white;
        border-radius:20px;
        padding:35px;
        box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }

    .section-title{
        font-size:24px;
        font-weight:600;
        color:#2563eb;
        margin-bottom:25px;
    }

    .form-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:25px;
    }

    .form-group{
        display:flex;
        flex-direction:column;
    }

    .form-group label{
        margin-bottom:8px;
        font-weight:600;
        color:#374151;
    }

    .form-group input{
        padding:14px;
        border:1px solid #d1d5db;
        border-radius:10px;
        font-size:15px;
    }

    .form-group input:focus{
        outline:none;
        border-color:#2563eb;
    }

    .readonly{
        background:#f3f4f6;
    }

    .full-width{
        grid-column:1 / span 2;
    }

    .note{
        margin-top:8px;
        color:#6b7280;
        font-size:14px;
    }

    .buttons{
        margin-top:35px;
        display:flex;
        justify-content:flex-end;
        gap:15px;
    }

    .btn{
        padding:14px 28px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        font-size:16px;
        font-weight:600;
    }

    .btn-secondary{
        background:#e5e7eb;
        color:#111827;
    }

    .btn-primary{
        background:#2563eb;
        color:white;
    }

    @media(max-width:900px){

        body{
            flex-direction:column;
        }

        .sidebar{
            width:100%;
        }

        .form-grid{
            grid-template-columns:1fr;
        }

        .full-width{
            grid-column:auto;
        }
    }
</style>
```

</head>

<body>

<div class="sidebar">

```
<div class="logo">
    <h2>Online Exam</h2>
    <p>Student Portal</p>
</div>

<div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/profile" class="active">Update Profile</a>
    <a href="/startExam">Start Exam</a>
    <a href="/viewResult">View Result</a>
</div>

<div class="logout-section">
    <form action="/logout" method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <button class="logout-btn" type="submit">
            Logout
        </button>
    </form>
</div>
```

</div>

<div class="main">

```
<div class="header">
    <h1>Update Profile</h1>
    <p>Update your personal information and account details.</p>
</div>

<div class="profile-card">

    <div class="section-title">
        Profile Information
    </div>

    <form action="/profile" method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <div class="form-grid">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text"
                       name="name"
                       th:value="${user.name}">
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text"
                       th:value="${user.username}"
                       class="readonly"
                       readonly>

                <div class="note">
                    Username cannot be changed
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email"
                       name="email"
                       th:value="${user.email}">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text"
                       name="phone"
                       th:value="${user.phone}">
            </div>

            <div class="form-group full-width">
                <label>Roll Number</label>
                <input type="text"
                       name="rollNo"
                       th:value="${user.rollNo}">
            </div>

            <div class="form-group full-width">
                <label>Change Password</label>
                <input type="password"
                       name="password"
                       placeholder="Leave blank to keep current password">

                <div class="note">
                    Enter a new password only if you want to change it.
                </div>
            </div>

        </div>

        <div class="buttons">

            <button type="button"
                    class="btn btn-secondary"
                    onclick="window.location.href='/dashboard'">
                Cancel
            </button>

            <button type="submit"
                    class="btn btn-primary">
                Update Profile
            </button>

        </div>

    </form>

</div>
```

</div>

</body>
</html>
